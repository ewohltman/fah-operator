# The fah-operator itself: a highly-available Deployment.
#
# Three replicas run concurrently but elect a single leader via the
# `fah-operator-leader` Lease, so only one reconciles at a time. Pod
# anti-affinity spreads the replicas across nodes.
---
apiVersion: v1
kind: Namespace
metadata:
  name: fah-operator-system
  labels:
    app.kubernetes.io/name: fah-operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fah-operator
  namespace: fah-operator-system
  labels:
    app.kubernetes.io/name: fah-operator
    app.kubernetes.io/component: operator
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: fah-operator
      app.kubernetes.io/component: operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fah-operator
        app.kubernetes.io/component: operator
    spec:
      serviceAccountName: fah-operator
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: fah-operator
                    app.kubernetes.io/component: operator
      containers:
        - name: operator
          image: ghcr.io/ewohltman/fah-operator:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: RUST_LOG
              value: info
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
