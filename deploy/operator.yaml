# The fah-operator itself: a highly-available Deployment.
#
# Three replicas run concurrently but elect a single leader via the
# `fah-operator-leader` Lease, so only one reconciles at a time. Pod
# anti-affinity spreads the replicas across nodes.
---
apiVersion: v1
kind: Namespace
metadata:
  name: fah-operator-system
  labels:
    app.kubernetes.io/name: fah-operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fah-operator
  namespace: fah-operator-system
  labels:
    app.kubernetes.io/name: fah-operator
    app.kubernetes.io/component: operator
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: fah-operator
      app.kubernetes.io/component: operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fah-operator
        app.kubernetes.io/component: operator
    spec:
      serviceAccountName: fah-operator
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: fah-operator
                    app.kubernetes.io/component: operator
      containers:
        - name: operator
          # Pinned by immutable digest so ArgoCD deploys deterministically: each
          # release bumps this digest, ArgoCD detects the drift and rolls out the
          # new build. A mutable `:latest` tag produces no manifest diff on a
          # code-only release, so ArgoCD would never redeploy it. The `:main` tag
          # is advisory (readability + lets Renovate/Dependabot track updates);
          # the digest is what actually pins the image. Update with the digest
          # printed by the `images.yml` publish workflow (or:
          # `docker buildx imagetools inspect ghcr.io/ewohltman/fah-operator:main`).
          image: ghcr.io/ewohltman/fah-operator:main@sha256:35f1515191edc73cea93d15de5a98a94b686a00c2a2169b44226619121c306f9
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: RUST_LOG
              value: info
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
