# A minimal FoldingAtHome resource. Applying it makes the operator roll out a
# Folding@Home client DaemonSet across every node in the cluster.
#
# Set `user`/`team` to your own donor name and team number. For a passkey or a
# v8 account token, create a Secret and reference it (see the commented block).
---
apiVersion: fah.ewohltman.github.io/v1alpha1
kind: FoldingAtHome
metadata:
  name: cluster-fold
  namespace: default
spec:
  user: Anonymous
  team: 0
  power: full
  enableGPU: false
