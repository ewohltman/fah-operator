name: Publish images

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-push:
    name: Build & push ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      # `contents: write` lets the operator leg commit the pinned digest back to
      # deploy/operator.yaml (see the final step). The push uses GITHUB_TOKEN,
      # whose pushes do not re-trigger workflows, so there is no build loop.
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: fah-operator
            context: .
            file: docker/operator/Dockerfile
          - name: fah-client
            context: docker/fah-client
            file: docker/fah-client/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

      # Keep deploy/operator.yaml pinned to the image just published, so ArgoCD
      # (which syncs deploy/ from main) rolls out every new operator build
      # deterministically. Runs only for the operator image on a push to main.
      - name: Pin operator digest in deploy/operator.yaml
        if: >-
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          matrix.name == 'fah-operator'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          new="ghcr.io/${OWNER}/fah-operator:main@${DIGEST}"
          sed -i -E "s#^(\s*image: )ghcr\.io/${OWNER}/fah-operator[^[:space:]]*#\1${new}#" deploy/operator.yaml
          if git diff --quiet -- deploy/operator.yaml; then
            echo "Operator digest already current; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/operator.yaml
          git commit -m "ci: pin operator image to ${DIGEST} [skip ci]"
          git push origin HEAD:main
