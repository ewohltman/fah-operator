name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    name: Automated review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request for the fah-operator, a Kubernetes operator
            written in Rust with kube-rs. Focus on:
            - Correctness of the reconcile logic, CRD schema, and RBAC (least privilege)
            - kube-rs / k8s-openapi API usage and idiomatic Rust
            - Security implications (secrets handling, pod securityContext, permissions)
            - Resilience of leader election and error handling
            - Whether deploy/crd.yaml is in sync with src/crd.rs when the CRD changes
            - Missing or inadequate tests

            Note: The PR branch is already checked out in the current working directory.

            Use `gh pr comment` for top-level feedback.
            Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) to highlight specific code issues.
            Only post GitHub comments - don't submit review text as messages.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
